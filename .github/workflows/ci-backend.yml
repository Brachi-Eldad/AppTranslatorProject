name: CI Backend

on:
  push:
    branches: [ feature/ci-cd, main ]
    paths:
      - 'backend/**'

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        working-directory: ./backend
        run: npm install
      - name: Run tests
        working-directory: ./backend
        run: npm test

  build:
    runs-on: ubuntu-latest
    needs: unit-tests
    steps:
      - uses: actions/checkout@v4
      - name: Build Image
        run: docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/app-translator-backend:${{ github.sha }} ./backend

  integration-tests:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - name: Run Integration Tests
        run: |
          docker compose -f docker-compose.test.yaml up --abort-on-container-exit --exit-code-from backend-test

  push:
    runs-on: ubuntu-latest
    needs: [build, integration-tests]
    steps:
      - uses: actions/checkout@v4
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Push Image
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/app-translator-backend:latest ./backend
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/app-translator-backend:${{ github.sha }} ./backend
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/app-translator-backend --all-tags

  update-helm:
    runs-on: ubuntu-latest
    needs: push
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Update Helm Chart values
        run: |
          sed -i "s|tag:.*|tag: \"${{ github.sha }}\"|" ./helm/values.yaml
      - name: Commit and push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add ./helm/values.yaml
          git commit -m "Update backend image tag to ${{ github.sha }}"
          git push origin feature/ci-cd
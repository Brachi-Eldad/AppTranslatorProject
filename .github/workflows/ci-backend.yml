name: CI Backend

on:
  push:
    branches: [ "feature/ci-cd", "main" ]
  workflow_dispatch:

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: cd backend && npm install
      - name: Run tests
        run: cd backend && npm test

  build:
    runs-on: ubuntu-latest
    needs: unit-tests
    steps:
      - uses: actions/checkout@v4
      - name: Build Image
        run: docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/app-translator-backend:${{ github.sha }} ./backend

  integration-tests:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - name: Run Integration Tests
        run: |
          docker compose -f docker-compose.test.yaml up --abort-on-container-exit --exit-code-from backend-test

  push:
    runs-on: ubuntu-latest
    needs: [build, integration-tests]
    steps:
      - uses: actions/checkout@v4
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Push Image
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/app-translator-backend:latest ./backend
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/app-translator-backend:${{ github.sha }} ./backend
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/app-translator-backend --all-tags
update-helm:
    needs: push
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Update Backend tag in Helm
        run: |
          sed -i "s|tag:.*|tag: \"${{ github.sha }}\"|" ./helm/values.yaml
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add ./helm/values.yaml
          git pull origin feature/ci-cd --rebase
          git commit -m "Update backend image tag [skip ci]" || echo "No changes"
          git push origin feature/ci-cd
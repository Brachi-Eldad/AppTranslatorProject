name: CI Backend

on:
  push:
    branches: [ "main", "feature/ci-cd" ]
    paths:
      - 'backend/**'
      - '.github/workflows/ci-backend.yml'
  pull_request:
    branches: [ "main" ]
    paths:
      - 'backend/**'

jobs:
  unit-tests:
    name: Run Backend Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          
      - name: Install dependencies
        working-directory: ./backend
        run: npm install
        
      - name: Run unit tests
        working-directory: ./backend
        run: npm test
        
      - name: Test summary
        run: echo "✅ Unit tests passed successfully!"

  build:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    needs: unit-tests
    steps:
      - uses: actions/checkout@v4
      
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/app-translator-backend:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/app-translator-backend:${{ github.sha }}

      - name: Build summary
        run: echo "🚀 Docker image pushed to Docker Hub successfully!"
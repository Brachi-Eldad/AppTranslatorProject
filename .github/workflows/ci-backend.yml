name: CI/CD Backend

on:
  push:
    branches: [ "feature/ci-cd" ] # עובדים על הברנץ' שלך
  pull_request:
    branches: [ "main" ]

jobs:
  unit-tests:
    name: Run Backend Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20' # שדרגנו לגרסה יציבה יותר
      - name: Install dependencies
        working-directory: ./backend
        run: npm install
      - name: Run unit tests
        working-directory: ./backend
        run: npm test

  build-and-push:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    needs: unit-tests
    outputs:
      image_tag: ${{ github.sha }}
    steps:
      - uses: actions/checkout@v4
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/app-translator-backend:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/app-translator-backend:${{ github.sha }}

  update-helm:
    name: Update Helm Manifests
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }} # שימוש בטוקן הפנימי של גיטהאב

      - name: Update values.yaml
        run: |
          sed -i "s/tag: .*/tag: \"${{ github.sha }}\"/g" helm/values.yaml
          
      - name: Commit and Push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add helm/values.yaml
          git commit -m "CD: Update backend image tag to ${{ github.sha }}"
          git push
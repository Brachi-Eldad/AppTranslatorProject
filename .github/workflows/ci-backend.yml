name: CI Backend

on:
  push:
    branches: [main, feature/ci-cd]
    paths:
      - 'backend/**'
      - '.github/workflows/main-pipeline.yml'
  pull_request:
    branches: [main]
    paths:
      - 'backend/**'

jobs:
  unit-tests:
    name: Run Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      - name: Install dependencies
        working-directory: ./backend
        run: npm install
      - name: Run unit tests
        working-directory: ./backend
        run: npm test

  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: unit-tests
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: false
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/app-translator-backend:${{ github.sha }}
          load: true

  push:
    name: Push to DockerHub
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/app-translator-backend:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/app-translator-backend:${{ github.sha }}
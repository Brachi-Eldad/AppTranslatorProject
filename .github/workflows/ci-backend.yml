name: CI Backend

on:
  push:
    branches: [ feature/ci-cd, main ]
    paths:
      - 'backend/**'

jobs:
  # שלב 1: בדיקות יחידה 
  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        working-directory: ./backend
        run: npm install
      - name: Run tests
        working-directory: ./backend
        run: npm test

  # שלב 2: בנייה (רק בנייה, בלי פוש עדיין)
  build:
    runs-on: ubuntu-latest
    needs: unit-tests
    steps:
      - uses: actions/checkout@v4
      - name: Build Image
        run: docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/app-translator-backend:${{ github.sha }} ./backend

  # שלב 3: בדיקות אינטגרציה !
  integration-tests:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - name: Run Integration Tests
        run: |
          docker compose -f docker-compose.test.yml up --abort-on-container-exit --exit-code-from backend-test

  # שלב 4: הפוש האמיתי 
  push:
    runs-on: ubuntu-latest
    needs: [build, integration-tests] 
    steps:
      - uses: actions/checkout@v4
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Push Image
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/app-translator-backend:latest ./backend
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/app-translator-backend:${{ github.sha }} ./backend
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/app-translator-backend --all-tags

  # שלב 5: עדכון ה-Helm (מה שעבד לך מקודם)
  update-helm:
    runs-on: ubuntu-latest
    needs: push
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

name: Full Deployment

on:
  push:
    branches: [main]

# נדרש עבור OIDC – התחברות ל-AWS ללא Access Keys
permissions:
  id-token: write
  contents: read

jobs:

  # שלב 1 – Deploy Frontend to S3 + CloudFront
  deploy-s3:
    name: Deploy Frontend to S3
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1

      - name: Sync frontend files to S3
        run: |
          aws s3 sync ./frontend s3://${{ secrets.S3_BUCKET_NAME }}/ \
            --delete \
            --exclude ".git/*" \
            --exclude "*.test.js" \
            --exclude "Dockerfile" \
            --exclude ".dockerignore" \
            --exclude "nginx*.conf"
          echo "✅ Frontend synced to S3!"

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/*"
          echo "✅ CloudFront cache cleared!"

  # שלב 2 – Deploy Backend to EC2
  deploy-ec2:
    name: Deploy Backend to EC2
    runs-on: ubuntu-latest
    needs: deploy-s3
    steps:
      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd app-translator
            git pull
            docker compose up -d --build
            echo "✅ Backend deployed successfully!"

            
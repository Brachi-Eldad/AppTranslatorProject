name: Full Deployment

on:
  push:
    branches: [ main ]

jobs:
  # שלב 1: פריסת ה-Frontend ל-S3
  deploy-s3:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Deploy to S3
        run: aws s3 sync . s3://app-translator-frontend-bucket --delete --exclude ".git/*"

  # שלב 2: פריסת ה-Backend ל-EC2
  deploy-ec2:
    runs-on: ubuntu-latest
    needs: deploy-s3
    steps:
      - uses: actions/checkout@v3
      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            echo "Starting Backend Deployment..."
            # הוספת פקודות ה-Docker שלך כאן
            # לדוגמה:
            # sudo docker pull brachieldad/app-translator-backend:latest
            # sudo docker stop backend-container || true
            # sudo docker rm backend-container || true
            # sudo docker run -d --name backend-container -p 80:80 brachieldad/app-translator-backend:latest
            echo "Deployment finished successfully!"
name: CI Frontend

on:
  push:
    branches: [main, feature/ci-cd, ci/cd]
    paths:
      - 'frontend/**'
      - '.github/workflows/ci-frontend.yml'
  pull_request:
    branches: [main]
    paths:
      - 'frontend/**'

# נדרש עבור OIDC – התחברות ל-AWS ללא Access Keys
permissions:
  id-token: write
  contents: read

jobs:

  # שלב 1 – Build
  build:
    name: Build Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify frontend files
        run: |
          ls -la frontend/
          echo "✅ Frontend files verified"

      - name: Login to DockerHub
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        if: github.event_name == 'push'
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/app-translator-frontend:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/app-translator-frontend:${{ github.sha }}

      - name: Build summary
        run: echo "✅ Frontend Docker image built and pushed!"

  # שלב 2 – Deploy to S3 + CloudFront invalidation
  deploy:
    name: Deploy to S3
    runs-on: ubuntu-latest
    needs: build
    if: |
      github.event_name == 'push' &&
      (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/ci/cd' || github.ref == 'refs/heads/feature/ci-cd')
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1

      - name: Sync frontend files to S3
        run: |
          aws s3 sync frontend/ s3://${{ secrets.S3_BUCKET_NAME }}/ \
            --delete \
            --exclude "*.test.js" \
            --exclude "Dockerfile" \
            --exclude ".dockerignore" \
            --exclude "nginx*.conf"
          echo "✅ Deployed to S3!"

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/*"
          echo "✅ CloudFront cache cleared!"
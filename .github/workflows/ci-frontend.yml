name: CI Frontend

on:
  push:
    branches: [ feature/ci-cd, main ]
    paths:
      - 'frontend/**'

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Frontend Image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/app-translator-frontend:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/app-translator-frontend:${{ github.sha }}

  update-helm:
    needs: build-and-push
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Update Frontend tag in Helm
        run: |
          sed -i "s|frontendTag:.*|frontendTag: \"${{ github.sha }}\"|" ./helm/values.yaml
      - name: Commit and push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add ./helm/values.yaml
          git commit -m "Update frontend image tag"
          git push origin feature/ci-cd
services:

  backend-test:
    build:
      context: ./backend
    environment:
      DATABASE_URL: postgres://postgres:postgres@db:5432/translations
      TRANSLATOR_HOST: translator
    depends_on:
      db:
        condition: service_healthy
      translator:
        condition: service_started
    command: npm test
    networks:
      - appnet

  db:
    image: postgres:15
    environment:
      POSTGRES_DB: translations
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - appnet

  translator:
    image: libretranslate/libretranslate
    ports:
      - "5000:5000"
    networks:
      - appnet

networks:
  appnet:
    driver: bridge